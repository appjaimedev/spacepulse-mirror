name: LL2 Mirror Sync

# Cadencia conservadora dentro del tramo anónimo (15 req/h por IP). El pasado es
# inmutable: una vez espejado, NO se vuelve a pedir (el backfill solo construye
# décadas que falten y es no-op al acabar; el refresco diario solo toca la década
# actual). Así nos centramos en el presente sin abusar de la API.
#   - cada 30 min   → --upcoming  (solo upcoming.json, 1 req) ≈ 2 req/h
#   - cada 2 horas  → --backfill  (1 década que falte; no-op cuando ya están todas)
#   - diario 04:00  → default     (SOLO década actual + astronautas + eventos + Mars)
#   - manual        → cualquiera de los modos
#
# Un LL2_TOKEN (opcional, secreto del repo) sube a 1000 req/h; sin él va igual.

on:
  schedule:
    - cron: '*/30 * * * *'   # frecuente: upcoming
    - cron: '0 */2 * * *'    # cada 2 h: backfill de una década (hasta completar)
    - cron: '0 4 * * *'      # diario: SOLO década actual + astronautas + eventos + Mars
  workflow_dispatch:
    inputs:
      mode:
        description: 'Build mode'
        required: true
        default: 'backfill'
        type: choice
        options: [default, upcoming, backfill, full]

permissions:
  contents: write

concurrency:
  group: mirror-sync
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build mirror
        env:
          LL2_TOKEN: ${{ secrets.LL2_TOKEN }}
          LL2_BASE: https://ll.thespacedevs.com/2.3.0
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            case "${{ inputs.mode }}" in
              default)  node scripts/build-mirror.js ;;
              upcoming) node scripts/build-mirror.js --upcoming ;;
              backfill) node scripts/build-mirror.js --backfill ;;
              full)     node scripts/build-mirror.js --full ;;
            esac
          elif [ "${{ github.event.schedule }}" = "0 4 * * *" ]; then
            node scripts/build-mirror.js
          elif [ "${{ github.event.schedule }}" = "0 */2 * * *" ]; then
            node scripts/build-mirror.js --backfill
          else
            node scripts/build-mirror.js --upcoming
          fi

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/api/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(mirror): sync LL2 data [skip ci]"
            git push
          fi
